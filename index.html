<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Admin - Crear Torneo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h2 { color: #1a73e8; text-align: center; }
        .error { color: #d93025; background: #fce8e6; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px;}
        .hidden { display: none; }
        form { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        label { font-weight: bold; margin-bottom: -10px; font-size: 0.9em; color: #555; }
        input, button { padding: 12px; border: 1px solid #dadce0; border-radius: 6px; font-size: 1em; }
        input[readonly] { background-color: #e9ecef; cursor: not-allowed; font-family: monospace; font-weight: bold; }
        button { background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #1557b0; }
        
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .qr-card { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .qr-card img { width: 150px; height: 150px; margin-bottom: 10px; border: 5px solid #fff; }
        .qr-card a { display: block; color: #1a73e8; text-decoration: none; font-size: 0.85em; font-weight: bold; word-break: break-all; margin-top: 5px; }
        .qr-card p { font-size: 0.85em; margin: 0 0 10px 0; color: #333; font-weight: bold; text-transform: uppercase; }
        .loading-text { font-size: 0.7em; color: #888; font-style: italic; }
        #status-db { text-align: center; font-size: 0.8em; color: #28a745; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="error-token" class="error hidden">⚠️ Acceso Denegado: Tokens de seguridad incorrectos.</div>

    <div id="seccion-crear" class="hidden">
        <h2>Nuevo Torneo</h2>
        <form id="form-torneo">
            <label>ID Torneo (Automático):</label>
            <input type="text" id="id_torneo" readonly>
            
            <label>Nombre del Torneo:</label>
            <input type="text" id="nombre_torneo" placeholder="Ej: Open Otoño 2024" required>
            
            <label>Fecha y Hora estimada:</label>
            <input type="datetime-local" id="fechahora_torneo" required>
            
            <button type="submit" id="btn-enviar">CREAR TORNEO Y GENERAR QRS</button>
        </form>
    </div>

    <div id="seccion-exito" class="hidden">
        <h2 style="color: #188038;">✅ Torneo Registrado: <span id="display-id"></span></h2>
        <div id="status-db">Procesando enlaces...</div>
        <div class="qr-grid" id="contenedor-qrs"></div>
        <button style="margin-top:25px; width:100%; background:#5f6368;" onclick="location.reload()">Crear otro torneo</button>
    </div>
</div>

<script>
    // https://juanignaciogarciauca.github.io/torneos/?token=torneos_jigg&token2=admin1&key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuYnBtamdiY3ljeXhkdWJtcW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjcxNTksImV4cCI6MjA5MTk0MzE1OX0.Pe4qVDRM3bP1BobROD2YSdfN1_tvEK7-D39BPALA0YI
    const params = new URLSearchParams(window.location.search);
    const SUPABASE_URL = "https://unbpmjgbcycyxdubmqnu.supabase.co"; 
    const SUPABASE_KEY = params.get('key') || "";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const HASH1 = "70955ed78d3cff207c71067386bf9a430cd93c8c98af7dde474f38d50383aac1";
    const HASH2 = "25f43b1486ad95a1398e3eeb3d83bc4010015fcc9bedb35b432e00298d5021f7";
    
    const t1 = params.get('token') || "";
    const t2 = params.get('token2') || "";

    async function sha256(txt) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function acortarURL(urlLarga) {
        try {
            const response = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(urlLarga)}`);
            const data = await response.json();
            return data.shorturl || urlLarga;
        } catch (error) {
            return urlLarga;
        }
    }

    async function validar() {
        if (await sha256(t1) === HASH1 && await sha256(t2) === HASH2) {
            document.getElementById('seccion-crear').classList.remove('hidden');
            const idAleatorio = Math.random().toString(36).substring(2, 7).toUpperCase() + Math.random().toString(36).substring(2, 7).toUpperCase();
            document.getElementById('id_torneo').value = idAleatorio;
        } else {
            document.getElementById('error-token').classList.remove('hidden');
        }
    }
    validar();

    document.getElementById('form-torneo').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar');
        btn.disabled = true;
        btn.innerText = "Guardando...";

        const idT = document.getElementById('id_torneo').value;
        const nombre = document.getElementById('nombre_torneo').value;
        const fecha = document.getElementById('fechahora_torneo').value;

        try {
            const { error } = await _supabase.from('listatorneos').insert([{ 
                id_torneo: idT, 
                nombre_torneo: nombre, 
                fechahora_torneo: fecha,
                tipo_torneo: 'PENDIENTE',
                max_num_grupos: 0
            }]);
            if (error) throw error;

            document.getElementById('display-id').innerText = idT;
            generarQRs(idT);
        } catch (err) { 
            alert("Error en Supabase: " + err.message); 
            btn.disabled = false;
            btn.innerText = "CREAR TORNEO";
        }
    });

    async function generarQRs(idT) {
        document.getElementById('seccion-crear').classList.add('hidden');
        document.getElementById('seccion-exito').classList.remove('hidden');
        const base = window.location.href.split('?')[0].replace('index.html', '');
        
        const config = [
            { t: "INSCRIPCIÓN", u: `${base}jugadores.html?token=${t1}&id_torneo=${idT}&key=${SUPABASE_KEY}`, db: "url_inscripcion" },
            { t: "RESULTADOS", u: `${base}partidos.html?token=${t1}&id_torneo=${idT}&key=${SUPABASE_KEY}`, db: "url_resultados" },
            { t: "CERRAR", u: `${base}cerrar.html?token=${t1}&token2=${t2}&id_torneo=${idT}&key=${SUPABASE_KEY}`, db: "url_cerrar" },
            { t: "REVISIÓN PÚBLICA", u: `${base}revisiontorneo.html?token=${t1}&id_torneo=${idT}&key=${SUPABASE_KEY}`, db: "url_revision_publica" },
            { t: "REVISIÓN ADMIN", u: `${base}revisiontorneo.html?token=${t1}&token2=${t2}&id_torneo=${idT}&key=${SUPABASE_KEY}`, db: "url_revision_admin" }
        ];

        const contenedor = document.getElementById('contenedor-qrs');
        const qrDataForDB = { id_torneo: idT };

        for (const item of config) {
            const card = document.createElement('div');
            card.className = 'qr-card';
            card.innerHTML = `<p>${item.t}</p><div class="loading-text">Acortando...</div>`;
            contenedor.appendChild(card);

            const urlFinal = await acortarURL(item.u);
            qrDataForDB[item.db] = urlFinal; // Guardamos para la DB

            card.innerHTML = `
                <p>${item.t}</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(urlFinal)}">
                <a href="${urlFinal}" target="_blank">Enlace corto ↗</a>
            `;
        }

        // Guardar en la tabla qrs_torneos
        const statusDiv = document.getElementById('status-db');
        statusDiv.innerText = "Guardando QRs en base de datos...";
        
        const { error } = await _supabase.from('qrs_torneos').insert([qrDataForDB]);
        
        if (error) {
            statusDiv.innerText = "❌ Error al guardar QRs: " + error.message;
            statusDiv.style.color = "red";
        } else {
            statusDiv.innerText = "✅ Todos los QRs han sido guardados en la base de datos.";
        }
    }
</script>
</body>
</html>
