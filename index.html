<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Crear Torneo (Supabase)</title>
    <!-- Cargamos la librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #1a73e8; text-align: center; }
        .error { color: #d93025; background: #fce8e6; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px;}
        .hidden { display: none; }
        form { display: flex; flex-direction: column; gap: 15px; }
        label { font-weight: bold; margin-bottom: -10px; font-size: 0.9em; color: #555; }
        input, button { padding: 12px; border: 1px solid #dadce0; border-radius: 6px; font-size: 1em; }
        input[readonly] { background-color: #e9ecef; cursor: not-allowed; font-family: monospace; font-weight: bold; }
        button { background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #1557b0; }
        
        .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .qr-card { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #ddd; }
        .qr-card img { width: 140px; height: 140px; margin-bottom: 10px; border: 1px solid #fff; }
        .qr-card a { display: block; color: #1a73e8; text-decoration: none; font-size: 0.8em; font-weight: bold; word-break: break-all; margin-top: 5px; }
        .qr-card a:hover { text-decoration: underline; }
        .qr-card p { font-size: 0.85em; margin: 0; color: #333; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div id="error-token" class="error hidden">⚠️ Acceso Denegado: Tokens de seguridad incorrectos.</div>

    <div id="seccion-crear" class="hidden">
        <h2>Nuevo Torneo (Supabase)</h2>
        <form id="form-torneo">
            <label>ID Torneo (Automático):</label>
            <input type="text" id="id_torneo" readonly>
            
            <label>Nombre del Torneo:</label>
            <input type="text" id="nombre_torneo" placeholder="Ej: Open Otoño 2024" required>
            
            <label>Fecha y Hora estimada:</label>
            <input type="datetime-local" id="fechahora_torneo" required>
            
            <button type="submit" id="btn-enviar">CREAR TORNEO Y GENERAR QRS</button>
        </form>
    </div>

    <div id="seccion-exito" class="hidden">
        <h2 style="color: #188038;">✅ Torneo Registrado: <span id="display-id"></span></h2>
        <div class="qr-grid" id="contenedor-qrs">
            <!-- Los QRs se generarán aquí -->
        </div>
        <button style="margin-top:25px; width:100%; background:#5f6368;" onclick="location.reload()">Crear otro torneo</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    // --- CONFIGURACIÓN SUPABASE ---
    const SUPABASE_URL = "https://unbpmjgbcycyxdubmqnu.supabase.co"; // "https://tu-proyecto.supabase.co"; 
    //"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuYnBtamdiY3ljeXhkdWJtcW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjcxNTksImV4cCI6MjA5MTk0MzE1OX0.Pe4qVDRM3bP1BobROD2YSdfN1_tvEK7-D39BPALA0YI";  //"tu-anon-key-aqui";
    // https://juanignaciogarciauca.github.io/torneos/?token=torneos_jigg&token2=admin1&key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuYnBtamdiY3ljeXhkdWJtcW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjcxNTksImV4cCI6MjA5MTk0MzE1OX0.Pe4qVDRM3bP1BobROD2YSdfN1_tvEK7-D39BPALA0YI
    const SUPABASE_KEY = params.get('key') || "";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const HASH1 = "70955ed78d3cff207c71067386bf9a430cd93c8c98af7dde474f38d50383aac1"; // torneos_jigg
    const HASH2 = "25f43b1486ad95a1398e3eeb3d83bc4010015fcc9bedb35b432e00298d5021f7"; // admin1

    
    const t1 = params.get('token') || "";
    const t2 = params.get('token2') || "";

    async function sha256(txt) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function validar() {
        if (await sha256(t1) === HASH1 && await sha256(t2) === HASH2) {
            document.getElementById('seccion-crear').classList.remove('hidden');
            const idAleatorio = Math.random().toString(36).substring(2, 7).toUpperCase() + Math.random().toString(36).substring(2, 7).toUpperCase();
            document.getElementById('id_torneo').value = idAleatorio;
        } else {
            document.getElementById('error-token').classList.remove('hidden');
        }
    }
    validar();

    document.getElementById('form-torneo').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar');
        btn.disabled = true;
        btn.innerText = "Guardando en Supabase...";

        const idT = document.getElementById('id_torneo').value;
        const nombre = document.getElementById('nombre_torneo').value;
        const fecha = document.getElementById('fechahora_torneo').value;

        try {
            // INSERTAR EN SUPABASE
            const { error } = await _supabase
                .from('listatorneos')
                .insert([{ 
                    id_torneo: idT, 
                    nombre_torneo: nombre, 
                    fechahora_torneo: fecha,
                    tipo_torneo: 'PENDIENTE',
                    max_num_grupos: 0
                }]);

            if (error) throw error;

            document.getElementById('display-id').innerText = idT;
            generarQRs(idT);

        } catch (err) { 
            alert("Error en Supabase: " + err.message); 
            btn.disabled = false;
            btn.innerText = "CREAR TORNEO";
        }
    });

    function generarQRs(idT) {
        document.getElementById('seccion-crear').classList.add('hidden');
        document.getElementById('seccion-exito').classList.remove('hidden');
        const base = window.location.href.split('?')[0].replace('index.html', '');
        
        const urls = [
            { t: "INSCRIPCIÓN", u: `${base}jugadores.html?token=${t1}&id_torneo=${idT}` },
            { t: "RESULTADOS", u: `${base}partidos.html?token=${t1}&id_torneo=${idT}` },
            { t: "CERRAR", u: `${base}cerrar.html?token=${t1}&token2=${t2}&id_torneo=${idT}` },
            { t: "REVISIÓN", u: `${base}revisiontorneo.html?token=${t1}&id_torneo=${idT}` }
        ];

        const contenedor = document.getElementById('contenedor-qrs');
        urls.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'qr-card';
            if(item.t === "CERRAR") card.style.background = "#fff3e0";
            
            card.innerHTML = `
                <p>${item.t}</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(item.u)}">
                <a href="${item.u}" target="_blank">Abrir enlace ↗</a>
            `;
            contenedor.appendChild(card);
        });
    }
</script>
</body>
</html>
