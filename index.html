<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Crear Torneo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #1a73e8; text-align: center; }
        .error { color: #d93025; background: #fce8e6; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 10px;}
        .hidden { display: none; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input, select, button { padding: 12px; border: 1px solid #dadce0; border-radius: 6px; font-size: 1em; }
        input[readonly] { background-color: #e9ecef; cursor: not-allowed; font-family: monospace; }
        button { background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; }
        .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .qr-card { background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #ddd; }
        .qr-card img { width: 130px; height: 130px; }
        .qr-card p { font-size: 0.8em; font-weight: bold; margin: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="error-token" class="error hidden">⚠️ Acceso Denegado: Tokens inválidos.</div>

    <div id="seccion-crear" class="hidden">
        <h2>Nuevo Torneo</h2>
        <form id="form-torneo">
            <label>ID Torneo:</label>
            <input type="text" id="id_torneo" readonly>
            <label>Nombre:</label>
            <input type="text" id="nombre_torneo" required>
            <label>Fecha/Hora:</label>
            <input type="datetime-local" id="fechahora_torneo" required>
            <label>Tipo inicial:</label>
            <select id="tipo_torneo">
                <option value="Grupos">Grupos</option>
                <option value="Eliminatoria">Eliminatoria Directa</option>
                <option value="Liga">Liga</option>
            </select>
            <label>Grupos/Mesas:</label>
            <input type="number" id="max_num_grupos" value="1" min="1">
            <button type="submit" id="btn-enviar">CREAR TORNEO</button>
        </form>
    </div>

    <div id="seccion-exito" class="hidden">
        <h2 style="color: #188038;">✅ Creado: <span id="display-id"></span></h2>
        <div class="qr-grid">
            <div class="qr-card"><div id="qr1"></div><p>JUGADORES</p></div>
            <div class="qr-card"><div id="qr2"></div><p>RESULTADOS</p></div>
            <div class="qr-card" style="background: #fff3e0;"><div id="qr3"></div><p>CERRAR (ADMIN)</p></div>
            <div class="qr-card"><div id="qr4"></div><p>REVISIÓN</p></div>
        </div>
        <button style="margin-top:20px; width:100%; background:#5f6368;" onclick="location.reload()">Nuevo</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbziaDCB98riN6FMCx6MVyIb_8houk024EIGvarWlksv_hTUmaezhOyKRp58gAOWAjgD1w/exec";
    const HASH1 = "70955ed78d3cff207c71067386bf9a430cd93c8c98af7dde474f38d50383aac1"; // torneos_jigg
    const HASH2 = "25f43b1486ad95a1398e3eeb3d83bc4010015fcc9bedb35b432e00298d5021f7"; // admin1

    const params = new URLSearchParams(window.location.search);
    const t1 = params.get('token') || "";
    const t2 = params.get('token2') || "";

    async function sha256(txt) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function validar() {
        let aux1 = await sha256(t1);
        let aux2 = await sha256(t2);
        console.log("Hash1:", aux1);
        console.log("Hash2:", aux2);
        if (aux1 === HASH1 && aux2 === HASH2) {
            document.getElementById('seccion-crear').classList.remove('hidden');
            document.getElementById('id_torneo').value = Math.random().toString(36).substring(2, 12).toUpperCase();
        } else {
            document.getElementById('error-token').classList.remove('hidden');
        }
    }
    validar();

    document.getElementById('form-torneo').addEventListener('submit', async (e) => {
        e.preventDefault();
        const idT = document.getElementById('id_torneo').value;
        const query = `?token=${t1}&hoja=listatorneos&action=write&id_torneo=${idT}&nombre_torneo=${encodeURIComponent(document.getElementById('nombre_torneo').value)}&fechahora_torneo=${document.getElementById('fechahora_torneo').value}&tipo_torneo=${document.getElementById('tipo_torneo').value}&max_num_grupos=${document.getElementById('max_num_grupos').value}`;
        
        try {
            const res = await fetch(SCRIPT_URL + query);
            const data = await res.json();
            if (data.result === "ok") {
                document.getElementById('display-id').innerText = idT;
                generarQRs(idT);
            }
        } catch (f) { alert("Error al guardar"); }
    });

    function generarQRs(idT) {
        document.getElementById('seccion-crear').classList.add('hidden');
        document.getElementById('seccion-exito').classList.remove('hidden');
        const base = window.location.href.split('?')[0].replace('index.html', '');
        
        const urls = [
            `${base}jugadores.html?token=${t1}&id_torneo=${idT}`,
            `${base}partidos.html?token=${t1}&id_torneo=${idT}`,
            `${base}cerrar.html?token=${t1}&token2=${t2}&id_torneo=${idT}`,
            `${base}revisiontorneo.html?token=${t1}&id_torneo=${idT}`
        ];

        urls.forEach((url, i) => {
            document.getElementById(`qr${i+1}`).innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}">`;
        });
    }
</script>
</body>
</html>
