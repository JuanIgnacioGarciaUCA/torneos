<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Revisión de Torneo - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a73e8; --admin: #ef6c00; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; font-size: 14px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; overflow-x: auto; }
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 8px; color: var(--primary); font-size: 1.2rem; margin-top: 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; font-weight: bold; color: #555; }
        .col-destacada { background: #f0f7ff; font-weight: bold; color: var(--primary); }
        
        .champion-box { background: #fff7e0; border: 2px solid #fbc02d; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
        .champion-name { color: #f57f17; font-size: 1.6rem; font-weight: bold; }

        .admin-card { border: 2px solid var(--admin); background: #fff3e0; }
        .admin-card h2 { color: var(--admin); border-color: var(--admin); }
        .admin-form { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        
        .btn-admin { background: var(--admin); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-admin:hover { background: #e65100; }
        
        .badge { font-size: 0.7rem; padding: 2px 4px; border-radius: 4px; font-weight: bold; }
        .badge-ok { background: #ceead6; color: #0d652d; }
        .badge-wait { background: #feefc3; color: #b05e00; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="view-campeon" class="champion-box hidden">
        <span>🏆 CAMPEÓN DEL TORNEO 🏆</span><br>
        <span id="nombre-campeon" class="champion-name">---</span>
    </div>

    <div class="card">
        <h2 id="titulo-torneo">Cargando Torneo...</h2>
        <div id="stats-resumen" style="color: #666;">Sincronizando con Supabase...</div>
    </div>

    <div id="zona-tablas"></div>

    <div id="admin-panel" class="card admin-card hidden">
        <h2>🛠 Administración: Generar Fase Final</h2>
        <div id="aviso-pendiente" style="color:red; font-size: 0.85rem; margin-bottom: 10px;">⚠️ Hay partidos de grupos pendientes.</div>
        
        <div class="admin-form">
            <div>
                <label>Clasificados a COPA:</label>
                <select id="num-copa">
                    <option value="0">--- Seleccionar ---</option>
                    <option value="2">2 (Final Directa)</option>
                    <option value="4">4 (Semifinales)</option>
                    <option value="8">8 (Cuartos)</option>
                </select>
            </div>
            <label><input type="checkbox" id="check-cons" onchange="document.getElementById('div-cons').classList.toggle('hidden')"> ¿Copa de Consolación?</label>
            <div id="div-cons" class="hidden">
                <label>Clasificados a CONSOLACIÓN:</label>
                <select id="num-cons">
                    <option value="2">2 (Final Directa)</option>
                    <option value="4">4 (Semifinales)</option>
                    <option value="8">8 (Cuartos)</option>
                </select>
            </div>
            <button id="btn-generar" class="btn-admin">GENERAR CUADROS</button>
        </div>
    </div>

    <div class="card">
        <h2>🎾 Resultados Registrados</h2>
        <div id="lista-partidos"></div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const SUPABASE_URL = "https://unbpmjgbcycyxdubmqnu.supabase.co"; 
    const SUPABASE_KEY = params.get('key') || "";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const HASH_T1 = "70955ed78d3cff207c71067386bf9a430cd93c8c98af7dde474f38d50383aac1";
    const HASH_T2 = "25f43b1486ad95a1398e3eeb3d83bc4010015fcc9bedb35b432e00298d5021f7";

    const t1 = params.get('token') || "";
    const t2 = params.get('token2') || "";
    const idT = params.get('id_torneo');

    let jugadores = [];
    let partidos = [];
    let stats = {}; 

    async function sha256(txt) {
        if(!txt) return "";
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function iniciar() {
        const h1 = await sha256(t1);
        if (h1 !== HASH_T1 || !idT) {
            document.body.innerHTML = "<h1>No autorizado</h1>";
            return;
        }
        const h2 = await sha256(t2);
        if (h2 === HASH_T2) document.getElementById('admin-panel').classList.remove('hidden');
        cargarDatos();
    }

    async function cargarDatos() {
        try {
            const { data: torneo } = await _supabase.from('listatorneos').select('*').eq('id_torneo', idT).single();
            const { data: jgs } = await _supabase.from('jugadores').select('*').eq('id_torneo', idT);
            const { data: pts } = await _supabase.from('lista_partidos').select('*').eq('id_torneo', idT);
            jugadores = jgs || [];
            partidos = pts || [];
            if (torneo) document.getElementById('titulo-torneo').innerText = torneo.nombre_torneo;
            procesar(torneo);
        } catch (e) { console.error(e); }
    }

    function procesar(torneo) {
        // Inicializar stats
        stats = {};
        const grupos = {};
        let pendientesGrupos = 0;
        let finalTerminada = false;
        let campeonID = null;

        jugadores.forEach(j => {
            stats[j.id_jugador] = { 
                nombre: j.nombre_jugador, mPts: 0, 
                sW: 0, sL: 0, pW: 0, pL: 0, pj: 0 
            };
        });

        partidos.forEach(p => {
            const games = [p.g1, p.g2, p.g3, p.g4, p.g5].filter(g => g && g !== "0-0");
            const esDeGrupos = !p.tipo_partido.toLowerCase().includes("copa") && !p.tipo_partido.toLowerCase().includes("cons");

            if(!grupos[p.tipo_partido]) grupos[p.tipo_partido] = new Set();
            grupos[p.tipo_partido].add(p.id_jugador1);
            grupos[p.tipo_partido].add(p.id_jugador2);

            if (games.length === 0) {
                if (esDeGrupos) pendientesGrupos++;
                return;
            }

            // Detectar No Presentado (W.O.)
            let isNoShow = false;
            let noShowWinner = 0; 
            if (games.length === 1) {
                const sc = games[0].split(/\D/).map(Number);
                if (sc[0] === 12 && sc[1] === 0) { isNoShow = true; noShowWinner = 1; }
                else if (sc[0] === 0 && sc[1] === 12) { isNoShow = true; noShowWinner = 2; }
            }

            let mSW1 = 0, mSW2 = 0, mPW1 = 0, mPW2 = 0;
            games.forEach(g => {
                const sc = g.split(/\D/).map(Number);
                if (sc.length === 2) {
                    mPW1 += sc[0]; mPW2 += sc[1];
                    if (sc[0] > sc[1]) mSW1++; else if (sc[1] > sc[0]) mSW2++;
                }
            });

            // Asignar puntos de partido (2 gana, 1 pierde, 0 no presentado)
            if (isNoShow) {
                if (noShowWinner === 1) { stats[p.id_jugador1].mPts += 2; stats[p.id_jugador2].mPts += 0; }
                else { stats[p.id_jugador1].mPts += 0; stats[p.id_jugador2].mPts += 2; }
            } else {
                if (mSW1 > mSW2) { stats[p.id_jugador1].mPts += 2; stats[p.id_jugador2].mPts += 1; }
                else { stats[p.id_jugador1].mPts += 1; stats[p.id_jugador2].mPts += 2; }
            }

            // Acumular Sets y Puntos Totales
            stats[p.id_jugador1].sW += mSW1; stats[p.id_jugador1].sL += mSW2;
            stats[p.id_jugador1].pW += mPW1; stats[p.id_jugador1].pL += mPW2;
            stats[p.id_jugador2].sW += mSW2; stats[p.id_jugador2].sL += mSW1;
            stats[p.id_jugador2].pW += mPW2; stats[p.id_jugador2].pL += mPW1;
            stats[p.id_jugador1].pj++; stats[p.id_jugador2].pj++;

            if (p.id_partido.includes("COPA-FINAL-01")) {
                finalTerminada = true;
                campeonID = mSW1 > mSW2 ? p.id_jugador1 : p.id_jugador2;
            }
        });

        if (pendientesGrupos === 0) document.getElementById('aviso-pendiente').classList.add('hidden');
        renderTablas(grupos);
        renderPartidos();

        if (torneo?.tipo_torneo === "Liga" && pendientesGrupos === 0 && partidos.length > 0) {
            const ranking = Object.keys(stats).sort((a,b) => compararJugadores(a, b));
            document.getElementById('view-campeon').classList.remove('hidden');
            document.getElementById('nombre-campeon').innerText = stats[ranking[0]].nombre;
        } else if (finalTerminada) {
            document.getElementById('view-campeon').classList.remove('hidden');
            document.getElementById('nombre-campeon').innerText = stats[campeonID].nombre;
        }
    }

    function compararJugadores(idA, idB) {
        const a = stats[idA], b = stats[idB];
        if (b.mPts !== a.mPts) return b.mPts - a.mPts;
        const diffSetsA = a.sW - a.sL, diffSetsB = b.sW - b.sL;
        if (diffSetsB !== diffSetsA) return diffSetsB - diffSetsA;
        const diffPtsA = a.pW - a.pL, diffPtsB = b.pW - b.pL;
        return diffPtsB - diffPtsA;
    }

    function renderTablas(grupos) {
        const zona = document.getElementById('zona-tablas');
        zona.innerHTML = "";
        Object.keys(grupos).sort().forEach(gn => {
            let h = `<div class="card"><h2>${gn}</h2><table><thead><tr>
                <th>Jugador</th><th>PJ</th><th class="col-destacada">Pts</th>
                <th>J. Gan</th><th>J. Per</th><th>P. Gan</th><th>P. Per</th>
                </tr></thead><tbody>`;
            const sIds = Array.from(grupos[gn]).sort((a,b) => compararJugadores(a,b));
            sIds.forEach(id => {
                const j = stats[id];
                h += `<tr><td>${j.nombre}</td><td>${j.pj}</td><td class="col-destacada">${j.mPts}</td>
                    <td>${j.sW}</td><td>${j.sL}</td><td>${j.pW}</td><td>${j.pL}</td></tr>`;
            });
            zona.innerHTML += h + `</tbody></table></div>`;
        });
    }

    function renderPartidos() {
        const zona = document.getElementById('lista-partidos');
        zona.innerHTML = partidos.map(p => {
            const res = [p.g1, p.g2, p.g3, p.g4, p.g5].filter(x => x && x!=="0-0").join(" | ");
            const badge = res ? `<span class="badge badge-ok">OK</span>` : `<span class="badge badge-wait">PTE</span>`;
            return `<div style="padding:8px; border-bottom:1px solid #eee; font-size:0.85rem;">
                ${badge} <b>${p.id_partido}</b> (${p.tipo_partido})<br>
                ${stats[p.id_jugador1].nombre} vs ${stats[p.id_jugador2].nombre}
                <div style="color:var(--primary); font-family:monospace; font-weight:bold;">${res}</div>
            </div>`;
        }).join("");
    }

    document.getElementById('btn-generar').addEventListener('click', async () => {
        const nCopa = parseInt(document.getElementById('num-copa').value);
        const qCons = document.getElementById('check-cons').checked;
        const nCons = qCons ? parseInt(document.getElementById('num-cons').value) : 0;
        
        const ranking = Object.keys(stats).sort((a,b) => compararJugadores(a,b));
        if (nCopa === 0) return alert("Selecciona clasificados.");
        if (ranking.length < (nCopa + nCons)) return alert("No hay suficientes jugadores.");

        if (!confirm("Se generarán los cuadros eliminatorios. ¿Continuar?")) return;
        const btn = document.getElementById('btn-generar');
        btn.disabled = true;

        async function crearCuadro(listaIds, prefijo) {
            const n = listaIds.length;
            let matches = [];
            for (let i = 0; i < n/2; i++) {
                const fase = n === 8 ? "CUARTOS" : (n === 4 ? "SEMIS" : "FINAL");
                matches.push({
                    id_torneo: idT,
                    id_partido: `${prefijo}-${fase}-0${i+1}`,
                    tipo_partido: `${prefijo} ${fase}`,
                    id_jugador1: listaIds[i],
                    id_jugador2: listaIds[n-1-i]
                });
            }
            return _supabase.from('lista_partidos').insert(matches);
        }

        await crearCuadro(ranking.slice(0, nCopa), "COPA");
        if (qCons) await crearCuadro(ranking.slice(nCopa, nCopa + nCons), "CONS");
        
        alert("Cuadros generados con éxito.");
        location.reload();
    });

    iniciar();
</script>
</body>
</html>
