<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisión y Fase Final</title>
    <style>
        :root { --primary: #1a73e8; --admin: #ef6c00; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 8px; color: var(--primary); font-size: 1.1rem; }
        
        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 8px; border: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; }
        
        /* Champion Box */
        .champion-box { background: #fff7e0; border: 2px solid #fbc02d; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
        .champion-name { color: #f57f17; font-size: 1.6rem; font-weight: bold; }

        /* Admin Section */
        .admin-card { border: 2px solid var(--admin); background: #fff3e0; }
        .admin-card h2 { color: var(--admin); border-color: var(--admin); }
        .admin-form { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        
        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .status-ok { background: #ceead6; color: #0d652d; }
        .status-wait { background: #feefc3; color: #b05e00; }
        
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-admin { background: var(--admin); }
        .btn-admin:hover { background: #e65100; }
        .btn-admin:disabled { background: #ccc; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- BLOQUE CAMPEÓN -->
    <div id="view-campeon" class="champion-box hidden">
        <span style="font-size: 1.2rem;">🏆 CAMPEÓN DEL TORNEO 🏆</span><br>
        <span id="nombre-campeon" class="champion-name">---</span>
    </div>

    <div class="card">
        <h2 id="titulo-torneo">Cargando Torneo...</h2>
        <div id="datos-jugadores" style="font-size: 0.8rem; color: #666;"></div>
    </div>

    <!-- CLASIFICACIÓN -->
    <div id="zona-tablas"></div>

    <!-- ADMINISTRACIÓN (CERRAR GRUPOS / GENERAR COPA) -->
    <div id="admin-panel" class="card admin-card hidden">
        <h2>🛠 Administración: Generar Fase Eliminatoria</h2>
        <div id="aviso-grupos-pendientes" style="color:red; font-size: 0.8rem; margin-bottom: 10px;">
            ⚠️ Aún hay partidos de grupos sin resultado.
        </div>
        <div class="admin-form">
            <label>Nº de jugadores clasificados para Copa:</label>
            <select id="num-clasificados">
                <option value="2">2 (Final Directa)</option>
                <option value="4">4 (Semifinales)</option>
                <option value="8">8 (Cuartos de Final)</option>
            </select>
            <label>
                <input type="checkbox" id="check-consolacion"> ¿Crear también Copa de Consolación?
            </label>
            <p style="font-size: 0.75rem; color: #555;">
                Nota: La Consolación usará el mismo número de jugadores (los siguientes clasificados).
            </p>
            <button id="btn-generar-copa" class="btn btn-admin">GENERAR CUADROS ELIMINATORIOS</button>
        </div>
    </div>

    <!-- LISTA DE PARTIDOS -->
    <div class="card">
        <h2>🎾 Partidos y Resultados</h2>
        <div id="lista-partidos"></div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbziaDCB98riN6FMCx6MVyIb_8houk024EIGvarWlksv_hTUmaezhOyKRp58gAOWAjgD1w/exec";
    const HASH_ADMIN = "25f43b1486ad95a1398e3eeb3d83bc4010015fcc9bedb35b432e00298d5021f7";
    const HASH_TORNEOS = "70955ed78d3cff207c71067386bf9a430cd93c8c98af7dde474f38d50383aac1";

    const params = new URLSearchParams(window.location.search);
    const t1 = params.get('token') || "";
    const t2 = params.get('token2') || "";
    const idT = params.get('id_torneo');

    let jugadores = [];
    let partidos = [];
    let esAdmin = false;
    let esLiga = false;

    async function sha256(txt) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function iniciar() {
        const h1 = await sha256(t1);
        const h2 = await sha256(t2);
        
        if (h1 !== HASH_TORNEOS) {
            document.body.innerHTML = "<h1>No autorizado</h1>";
            return;
        }

        if (h2 === HASH_ADMIN) {
            esAdmin = true;
            document.getElementById('admin-panel').classList.remove('hidden');
        }

        cargarDatos();
    }

    async function cargarDatos() {
        try {
            const [rJ, rP, rT] = await Promise.all([
                fetch(`${SCRIPT_URL}?token=${t1}&hoja=jugadores&action=read&id_torneo=${idT}`),
                fetch(`${SCRIPT_URL}?token=${t1}&hoja=lista_partidos&action=read&id_torneo=${idT}`),
                fetch(`${SCRIPT_URL}?token=${t1}&hoja=listatorneos&action=read&id_torneo=${idT}`)
            ]);

            const dJ = await rJ.json(); jugadores = dJ.datos || [];
            const dP = await rP.json(); partidos = dP.datos || [];
            const dT = await rT.json(); 
            
            const infoT = dT.datos ? dT.datos[0] : null;
            if(infoT) {
                document.getElementById('titulo-torneo').innerText = infoT.nombre_torneo;
                esLiga = (infoT.tipo_torneo === "Liga");
            }

            procesar();
        } catch (e) { alert("Error al cargar datos"); }
    }

    function procesar() {
        const stats = {}; // id_jugador -> {pts, pj, nombre}
        const grupos = {}; // nombre_grupo -> [ids]
        let partidosPendientesGrupos = 0;
        let partidosFaseFinal = [];

        jugadores.forEach(j => stats[j.id_jugador] = {pts: 0, pj: 0, nombre: j.nombre_jugador});

        partidos.forEach(p => {
            const tipo = p.tipo_partido.toLowerCase();
            const esDeGrupos = tipo.includes("grupo") || tipo.includes("liga");
            
            if(!grupos[p.tipo_partido]) grupos[p.tipo_partido] = new Set();
            grupos[p.tipo_partido].add(p.id_jugador1);
            grupos[p.tipo_partido].add(p.id_jugador2);

            let setsJ1 = 0, setsJ2 = 0, jugado = false;
            [p.g1, p.g2, p.g3, p.g4, p.g5].forEach(g => {
                if(!g || g === "0-0") return;
                jugado = true;
                const s = g.split(/\D/).map(Number);
                if(s[0] > s[1]) setsJ1++; else if(s[1] > s[0]) setsJ2++;
            });

            if(jugado) {
                stats[p.id_jugador1].pts += setsJ1;
                stats[p.id_jugador1].pj++;
                stats[p.id_jugador2].pts += setsJ2;
                stats[p.id_jugador2].pj++;
            } else if(esDeGrupos) {
                partidosPendientesGrupos++;
            }
            
            if(!esDeGrupos) partidosFaseFinal.push({p, j1_wins: setsJ1, j2_wins: setsJ2, jugado});
        });

        renderTablas(grupos, stats);
        renderPartidos(partidos, stats);

        // LÓGICA LIGA (Campeón)
        if(esLiga && partidos.length > 0 && partidosPendientesGrupos === 0) {
            const lider = Object.values(stats).sort((a,b) => b.pts - a.pts)[0];
            document.getElementById('view-campeon').classList.remove('hidden');
            document.getElementById('nombre-campeon').innerText = lider.nombre;
        }

        // LÓGICA ADMIN
        if(esAdmin && !esLiga) {
            if(partidosPendientesGrupos === 0) document.getElementById('aviso-grupos-pendientes').classList.add('hidden');
        }

        // LÓGICA CAMPEÓN COPA
        const final = partidosFaseFinal.find(pf => pf.p.id_partido.includes("FINAL-01") && !pf.p.id_partido.includes("CONS"));
        if(final && final.jugado) {
            const ganador = (final.j1_wins > final.j2_wins) ? stats[final.p.id_jugador1].nombre : stats[final.p.id_jugador2].nombre;
            document.getElementById('view-campeon').classList.remove('hidden');
            document.getElementById('nombre-campeon').innerText = ganador;
        }
    }

    function renderTablas(grupos, stats) {
        const zona = document.getElementById('zona-tablas');
        zona.innerHTML = "";
        Object.keys(grupos).sort().forEach(gName => {
            let html = `<div class="card"><h3>${gName}</h3><table><tr><th>Jugador</th><th>PJ</th><th>Pts (Sets)</th></tr>`;
            const sortedIds = Array.from(grupos[gName]).sort((a,b) => stats[b].pts - stats[a].pts);
            sortedIds.forEach(id => {
                html += `<tr><td>${stats[id].nombre}</td><td>${stats[id].pj}</td><td><b>${stats[id].pts}</b></td></tr>`;
            });
            zona.innerHTML += html + `</table></div>`;
        });
    }

    function renderPartidos(list, stats) {
        const zona = document.getElementById('lista-partidos');
        zona.innerHTML = list.map(p => {
            const sets = [p.g1, p.g2, p.g3, p.g4, p.g5].filter(s => s && s!=="0-0").join(" | ");
            const status = sets ? `<span class="status-badge status-ok">OK</span>` : `<span class="status-badge status-wait">PTE</span>`;
            return `<div style="padding:8px; border-bottom:1px solid #eee; font-size:0.8rem;">
                ${status} <b>${p.id_partido}</b> (${p.tipo_partido}): ${stats[p.id_jugador1].nombre} vs ${stats[p.id_jugador2].nombre} 
                <div style="color:var(--primary); font-family:monospace;">${sets}</div>
            </div>`;
        }).join("");
    }

    // GENERACIÓN DE FASE ELIMINATORIA (COPA)
    document.getElementById('btn-generar-copa').addEventListener('click', async () => {
        const numQ = parseInt(document.getElementById('num-clasificados').value);
        const conConsolacion = document.getElementById('check-consolacion').checked;
        
        // 1. Obtener Ranking Global de grupos
        const ranking = Object.keys(stats).map(id => ({id, pts: stats[id].pts}))
                        .sort((a,b) => b.pts - a.pts);

        if(ranking.length < numQ) return alert("No hay suficientes jugadores");

        const clasificadosCopa = ranking.slice(0, numQ);
        const clasificadosCons = conConsolacion ? ranking.slice(numQ, numQ * 2) : [];

        if(conConsolacion && ranking.length < (numQ * 2)) {
            return alert("No hay suficientes jugadores para consolación (" + (numQ*2) + " requeridos)");
        }

        if(!confirm(`Se generará una Copa para ${numQ} jugadores ${conConsolacion ? 'y Consolación' : ''}. ¿Continuar?`)) return;

        const btn = document.getElementById('btn-generar-copa');
        btn.disabled = true;

        // Función para crear enfrentamientos eliminatorios
        async function crearCuadro(lista, prefijo) {
            const n = lista.length;
            let matches = [];
            // Emparejamiento: 1º vs Ultimo, 2º vs Penúltimo...
            for(let i=0; i < n/2; i++) {
                const j1 = lista[i];
                const j2 = lista[n - 1 - i];
                const fase = n === 8 ? "CUARTOS" : (n === 4 ? "SEMIS" : "FINAL");
                matches.push({
                    id: `${prefijo}-${fase}-0${i+1}`,
                    tipo: `${prefijo} ${fase}`,
                    j1: j1.id,
                    j2: j2.id
                });
            }
            for(let m of matches) {
                const url = `${SCRIPT_URL}?token=${t1}&hoja=lista_partidos&action=write&id_torneo=${idT}&id_partido=${m.id}&tipo_partido=${encodeURIComponent(m.tipo)}&id_jugador1=${m.j1}&id_jugador2=${m.j2}`;
                await fetch(url);
            }
        }

        await crearCuadro(clasificadosCopa, "COPA");
        if(conConsolacion) await crearCuadro(clasificadosCons, "CONSOLACION");

        alert("Fases eliminatorias generadas.");
        location.reload();
    });

    iniciar();
</script>
</body>
</html>
