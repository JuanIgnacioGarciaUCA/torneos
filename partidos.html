<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Resultados - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #d93025;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #3c4043;
            --accent: #1a73e8;
            --admin: #ef6c00;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }

        .header-card { background: var(--primary); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(217, 48, 37, 0.2); }
        .header-card.admin-mode { background: var(--admin); box-shadow: 0 4px 12px rgba(239, 108, 0, 0.2); }

        h2 { margin: 0; font-size: 1.4rem; }
        #info { font-size: 0.9rem; opacity: 0.9; margin-top: 5px; }

        .info-panel { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .list-box { flex: 0 0 85%; background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #e0e0e0; max-height: 200px; overflow-y: auto; font-size: 0.85rem; }
        .list-box h4 { margin: 0 0 8px 0; color: var(--primary); border-bottom: 1px solid #fce8e6; padding-bottom: 5px; position: sticky; top: 0; background: white; z-index: 10; }

        .match-item { padding: 8px 0; border-bottom: 1px solid #f1f1f1; }
        .score-preview { display: block; color: var(--accent); font-family: monospace; font-weight: bold; margin-top: 3px; font-size: 0.8rem; }
        .match-divider { font-weight: bold; color: #666; font-size: 0.75rem; text-transform: uppercase; background: #f0f0f0; padding: 4px 8px; border-radius: 4px; margin: 10px 0 5px 0; }

        .form-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }

        select, input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; background: white; }
        select:focus, input:focus { border-color: var(--primary); outline: none; }

        .games-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .help-text { font-size: 0.75rem; color: #70757a; margin-bottom: 10px; display: block; }

        button { width: 100%; padding: 16px; background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: #dadce0; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <div id="header" class="header-card">
        <h2 id="titulo-pagina">Registrar Resultado</h2>
        <div id="info">Sincronizando...</div>
    </div>

    <div class="info-panel">
        <div class="list-box">
            <h4>📅 Partidos del Torneo</h4>
            <div id="lista-partidos">Cargando...</div>
        </div>
        <div class="list-box">
            <h4>🏓 Jugadores</h4>
            <div id="lista-jugadores">Cargando...</div>
        </div>
    </div>

    <div class="form-card">
        <form id="form-resultado">
            <div class="form-group">
                <label>Seleccionar Partido:</label>
                <select id="id_partido" required>
                    <option value="">Cargando partidos...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Resultados por Set:</label>
                <span class="help-text">Rellena en orden (ej: 11-5, 11 9...)</span>
                <div class="games-container">
                    <input type="text" id="g1" placeholder="Set 1">
                    <input type="text" id="g2" placeholder="Set 2">
                    <input type="text" id="g3" placeholder="Set 3">
                    <input type="text" id="g4" placeholder="Set 4">
                    <input type="text" id="g5" placeholder="Set 5">
                </div>
            </div>

            <button type="submit" id="btn-enviar">GUARDAR RESULTADO</button>
        </form>
    </div>
</div>

<div id="error-auth" class="hidden" style="text-align:center; padding:50px; color:red;">
    <h3>⚠️ Acceso Denegado</h3>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const SUPABASE_URL = "https://unbpmjgbcycyxdubmqnu.supabase.co"; 
    const SUPABASE_KEY = params.get('key') || "";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const HASH_T1 = "70955ed78d3cff207c71067386bf9a430cd93c8c98af7dde474f38d50383aac1";
    const HASH_T2 = "25f43b1486ad95a1398e3eeb3d83bc4010015fcc9bedb35b432e00298d5021f7";

    const t1 = params.get('token') || "";
    const t2 = params.get('token2') || "";
    const idTorneo = params.get('id_torneo');

    let cachePartidos = [];
    let cacheJugadores = {};
    let esAdmin = false;

    async function sha256(txt) {
        if(!txt) return "";
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function iniciar() {
        const h1 = await sha256(t1);
        if (h1 !== HASH_T1 || !idTorneo) {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('error-auth').classList.remove('hidden');
            return;
        }

        const h2 = await sha256(t2);
        if (h2 === HASH_T2) {
            esAdmin = true;
            document.getElementById('header').classList.add('admin-mode');
            document.getElementById('titulo-pagina').innerText = "Modo Administrador";
        }

        document.getElementById('info').innerText = "Torneo: " + idTorneo;
        cargarDatos();
    }

    async function cargarDatos() {
        try {
            // 1. Cargar Jugadores
            const { data: dataJ } = await _supabase.from('jugadores').select('*').eq('id_torneo', idTorneo);
            const divJ = document.getElementById('lista-jugadores');
            divJ.innerHTML = "";
            (dataJ || []).forEach(j => {
                cacheJugadores[j.id_jugador] = j.nombre_jugador;
                divJ.innerHTML += `<div><b>${j.id_jugador}</b> ${j.nombre_jugador}</div>`;
            });

            // 2. Cargar Partidos
            const { data: dataP } = await _supabase.from('lista_partidos').select('*').eq('id_torneo', idTorneo);
            cachePartidos = dataP || [];
            
            const divP = document.getElementById('lista-partidos');
            const selectP = document.getElementById('id_partido');
            
            divP.innerHTML = "";
            selectP.innerHTML = '<option value="">--- Seleccionar partido ---</option>';

            // SEPARAR Y ORDENAR
            const jugados = cachePartidos.filter(p => [p.g1, p.g2, p.g3, p.g4, p.g5].some(g => g && g !== "0-0"));
            const pendientes = cachePartidos.filter(p => ![p.g1, p.g2, p.g3, p.g4, p.g5].some(g => g && g !== "0-0"));

            // Función de ordenación natural (G1-P2 antes que G1-P10)
            const sortFn = (a, b) => a.id_partido.localeCompare(b.id_partido, undefined, {numeric: true, sensitivity: 'base'});
            
            jugados.sort(sortFn);
            pendientes.sort(sortFn);

            // RENDERIZAR LISTA LATERAL (Jugados primero, luego pendientes)
            if (jugados.length > 0) {
                divP.innerHTML += '<div class="match-divider">Finalizados</div>';
                jugados.forEach(p => divP.innerHTML += renderRow(p, true));
            }
            if (pendientes.length > 0) {
                divP.innerHTML += '<div class="match-divider">Pendientes</div>';
                pendientes.forEach(p => divP.innerHTML += renderRow(p, false));
            }

            // RELLENAR SELECT (Siguiendo la lógica de visibilidad)
            const sortedAll = [...jugados, ...pendientes]; // Para que el dropdown también tenga orden
            sortedAll.forEach(p => {
                const tieneRes = [p.g1, p.g2, p.g3, p.g4, p.g5].some(g => g && g !== "0-0");
                if (esAdmin || !tieneRes) {
                    const opt = document.createElement('option');
                    opt.value = p.id_partido;
                    const n1 = cacheJugadores[p.id_jugador1] || p.id_jugador1;
                    const n2 = cacheJugadores[p.id_jugador2] || p.id_jugador2;
                    opt.innerText = `${p.id_partido}: ${n1} vs ${n2}`;
                    selectP.appendChild(opt);
                }
            });

            if (selectP.options.length === 1 && !esAdmin) {
                selectP.innerHTML = '<option value="">✅ Todos completados</option>';
                document.getElementById('btn-enviar').disabled = true;
            }

        } catch (e) { console.error(e); }
    }

    function renderRow(p, done) {
        const n1 = cacheJugadores[p.id_jugador1] || p.id_jugador1;
        const n2 = cacheJugadores[p.id_jugador2] || p.id_jugador2;
        const scores = [p.g1, p.g2, p.g3, p.g4, p.g5].filter(s => s && s !== "0-0");
        const resText = done ? `<span class="score-preview">R: ${scores.join(' | ')}</span>` : '<span class="score-preview" style="color:#bbb">Pendiente</span>';
        return `<div class="match-item"><b>${p.id_partido}:</b> ${n1} vs ${n2}${resText}</div>`;
    }

    document.getElementById('form-resultado').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar');
        const idPSelected = document.getElementById('id_partido').value;
        if (!idPSelected) return alert("Selecciona un partido.");
        
        const partido = cachePartidos.find(p => p.id_partido === idPSelected);
        const games = [];
        let hayVacio = false;

        for(let i=1; i<=5; i++) {
            let val = document.getElementById('g'+i).value.trim();
            if (val === "") { hayVacio = true; games.push("0-0"); }
            else {
                if (hayVacio) return alert(`Sigue el orden (falta Set ${i-1}).`);
                const nums = val.match(/\d+/g);
                if (!nums || nums.length !== 2) return alert(`Set ${i} requiere 2 números.`);
                games.push(`${nums[0]}-${nums[1]}`);
            }
        }

        btn.disabled = true;
        btn.innerText = "GUARDANDO...";

        const { error } = await _supabase.from('lista_partidos').upsert({
            id_torneo: idTorneo, id_partido: partido.id_partido, tipo_partido: partido.tipo_partido,
            id_jugador1: partido.id_jugador1, id_jugador2: partido.id_jugador2,
            g1: games[0], g2: games[1], g3: games[2], g4: games[3], g5: games[4],
            log: new Date().toISOString()
        });

        if (error) { alert("Error: " + error.message); btn.disabled = false; }
        else { alert("✅ Guardado."); location.reload(); }
    });

    iniciar();
</script>
</body>
</html>
