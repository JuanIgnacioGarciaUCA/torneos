<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resultados - Torneo</title>
    <style>
        :root {
            --primary: #d93025;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #3c4043;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0; 
            display: flex; 
            justify-content: center;
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            padding: 15px;
            box-sizing: border-box;
        }

        .header-card {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(217, 48, 37, 0.2);
        }

        h2 { margin: 0; font-size: 1.4rem; }
        #info { font-size: 0.9rem; opacity: 0.9; margin-top: 5px; }

        /* Paneles de información (Jugadores y Partidos) */
        .info-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto; /* Scroll lateral en móviles pequeños */
            padding-bottom: 10px;
        }

        .list-box {
            flex: 0 0 75%; /* Cada caja ocupa el 75% del ancho para invitar a deslizar */
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            max-height: 180px;
            overflow-y: auto;
            font-size: 0.85rem;
        }

        .list-box h4 { margin: 0 0 8px 0; color: var(--primary); border-bottom: 1px solid #fce8e6; padding-bottom: 5px; position: sticky; top: 0; background: white; }

        /* Formulario */
        .form-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px; /* Evita zoom en iOS */
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .id-input { 
            font-family: 'Courier New', monospace; 
            text-transform: uppercase; 
            background: #fff8f7;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Rejilla de Games */
        .games-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 arriba, 2 abajo */
            gap: 10px;
        }
        .games-container input:nth-child(4), 
        .games-container input:nth-child(5) {
            grid-column: span 1;
        }

        .help-text { font-size: 0.75rem; color: #70757a; margin-bottom: 10px; display: block; }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(217, 48, 37, 0.3);
            margin-top: 10px;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background-color: #dadce0; box-shadow: none; }

        .error-view { text-align: center; padding: 40px 20px; color: var(--primary); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <div class="header-card">
        <h2>Registrar Resultado</h2>
        <div id="info">Sincronizando...</div>
    </div>

    <!-- Paneles de referencia -->
    <div class="info-panel">
        <div class="list-box">
            <h4>🏓 Jugadores</h4>
            <div id="lista-jugadores">Cargando...</div>
        </div>
        <div class="list-box">
            <h4>📅 Partidos</h4>
            <div id="lista-partidos">Cargando...</div>
        </div>
    </div>

    <!-- Formulario -->
    <div class="form-card">
        <form id="form-resultado">
            <div class="form-group">
                <label>Código del Partido:</label>
                <input type="text" id="id_partido" class="id-input" placeholder="EJ: G1-P1" required autofocus>
            </div>

            <div class="form-group">
                <label>Resultados por Set:</label>
                <span class="help-text">Usa guion o espacio (ej: 11-5)</span>
                <div class="games-container">
                    <input type="text" id="g1" placeholder="Set 1">
                    <input type="text" id="g2" placeholder="Set 2">
                    <input type="text" id="g3" placeholder="Set 3">
                    <input type="text" id="g4" placeholder="Set 4">
                    <input type="text" id="g5" placeholder="Set 5">
                </div>
            </div>

            <button type="submit" id="btn-enviar">GUARDAR CAMBIOS</button>
        </form>
    </div>
</div>

<div id="error-auth" class="error-view hidden">
    <h3>⚠️ Acceso Denegado</h3>
    <p>Token o ID de torneo no válidos.</p>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbziaDCB98riN6FMCx6MVyIb_8houk024EIGvarWlksv_hTUmaezhOyKRp58gAOWAjgD1w/exec";
    const HASH_REQUERIDO = "70955ed78d3cff207c71067386bf9a430cd93c8c98af7dde474f38d50383aac1";

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || "";
    const idTorneo = params.get('id_torneo');

    let cachePartidos = [];
    let cacheJugadores = {};

    async function sha256(txt) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function iniciar() {
        if (await sha256(token) !== HASH_REQUERIDO || !idTorneo) {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('error-auth').classList.remove('hidden');
            return;
        }
        document.getElementById('info').innerText = "Torneo: " + idTorneo;
        cargarDatos();
    }

    async function cargarDatos() {
        try {
            const resJ = await fetch(`${SCRIPT_URL}?token=${token}&hoja=jugadores&action=read&id_torneo=${idTorneo}`);
            const dataJ = await resJ.json();
            const divJ = document.getElementById('lista-jugadores');
            divJ.innerHTML = "";
            dataJ.datos.forEach(j => {
                cacheJugadores[j.id_jugador] = j.nombre_jugador;
                divJ.innerHTML += `<div><b>${j.id_jugador}</b> ${j.nombre_jugador}</div>`;
            });

            const resP = await fetch(`${SCRIPT_URL}?token=${token}&hoja=lista_partidos&action=read&id_torneo=${idTorneo}`);
            const dataP = await resP.json();
            cachePartidos = dataP.datos || [];
            const divP = document.getElementById('lista-partidos');
            divP.innerHTML = "";
            
            cachePartidos.forEach(p => {
                const n1 = cacheJugadores[p.id_jugador1] || p.id_jugador1;
                const n2 = cacheJugadores[p.id_jugador2] || p.id_jugador2;
                divP.innerHTML += `<div><b>${p.id_partido}:</b> ${n1} / ${n2}</div>`;
            });
        } catch (e) { document.getElementById('info').innerText = "Error de conexión"; }
    }

    document.getElementById('form-resultado').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar');
        const idP = document.getElementById('id_partido').value.trim().toUpperCase();
        const partido = cachePartidos.find(p => p.id_partido.toUpperCase() === idP);
        
        if (!partido) return alert("El código de partido no existe.");

        const regexFormat = /^\d+\D\d+$/;
        const games = [];
        for(let i=1; i<=5; i++) {
            let val = document.getElementById('g'+i).value.trim();
            if (val !== "" && !regexFormat.test(val)) return alert(`Formato de Set ${i} incorrecto (ej: 11-5)`);
            games.push(val || "0-0");
        }

        btn.disabled = true;
        btn.innerText = "GUARDANDO...";

        const query = new URLSearchParams({
            token: token, hoja: "lista_partidos", action: "write", id_torneo: idTorneo,
            id_partido: partido.id_partido, tipo_partido: partido.tipo_partido,
            id_jugador1: partido.id_jugador1, id_jugador2: partido.id_jugador2,
            g1: games[0], g2: games[1], g3: games[2], g4: games[3], g5: games[4]
        });

        try {
            const res = await fetch(`${SCRIPT_URL}?${query.toString()}`);
            const data = await res.json();
            if (data.result === "ok") {
                alert("✅ Guardado");
                document.getElementById('form-resultado').reset();
                cargarDatos();
            }
        } catch (err) { alert("Error al guardar"); }
        finally { btn.disabled = false; btn.innerText = "GUARDAR CAMBIOS"; }
    });

    iniciar();
</script>
</body>
</html>
