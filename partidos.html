<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Análisis de Resultados - Torneo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #d93025;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #3c4043;
            --accent: #1a73e8;
            --admin: #ef6c00;
            --warning: #fff3cd;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }

        .header-card { background: var(--primary); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .header-card.admin-mode { background: var(--admin); }

        h2 { margin: 0; font-size: 1.4rem; }
        #info { font-size: 0.9rem; opacity: 0.9; margin-top: 5px; }

        .info-panel { margin-bottom: 20px; }
        .list-box { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #e0e0e0; max-height: 200px; overflow-y: auto; font-size: 0.85rem; width: 100%; box-sizing: border-box; }
        .list-box h4 { margin: 0 0 8px 0; color: var(--primary); border-bottom: 1px solid #fce8e6; padding-bottom: 5px; position: sticky; top: 0; background: white; z-index: 10; }

        .match-item { padding: 8px 0; border-bottom: 1px solid #f1f1f1; }
        .score-preview { display: block; color: var(--accent); font-family: monospace; font-weight: bold; margin-top: 3px; font-size: 0.8rem; }
        .match-divider { font-weight: bold; color: #444; font-size: 0.8rem; text-transform: uppercase; background: #eee; padding: 6px 10px; border-radius: 6px; margin: 15px 0 8px 0; }

        .form-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }

        select, input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; background: white; }
        
        /* Cuadro de Advertencia de Orden */
        .match-preview { background: var(--warning); padding: 15px; border-radius: 10px; border: 1px solid #ffeeba; margin-bottom: 15px; color: #856404; font-size: 0.9rem; line-height: 1.4; }
        .match-preview b { color: #000; }

        .games-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .help-text { font-size: 0.75rem; color: #70757a; margin-bottom: 10px; display: block; }

        button { width: 100%; padding: 16px; background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: #dadce0; }

        .admin-unlock-card { background: #fff3e0; padding: 15px; border-radius: 12px; border: 1px dashed var(--admin); text-align: center; margin-bottom: 40px; }
        .btn-unlock { background-color: var(--admin); padding: 10px; font-size: 0.9rem; margin-top: 5px; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;}

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <div id="header" class="header-card">
        <h2 id="titulo-pagina">Registrar Resultado</h2>
        <div id="info">Sincronizando...</div>
    </div>

    <div class="info-panel">
        <div class="list-box">
            <h4>📅 Partidos del Torneo</h4>
            <div id="lista-partidos">Cargando partidos...</div>
        </div>
    </div>

    <div class="form-card">
        <form id="form-resultado">
            <div class="form-group">
                <label>Selecciona tu nombre:</label>
                <select id="select_jugador_1" required>
                    <option value="">Cargando jugadores...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Selecciona a tu oponente:</label>
                <select id="select_jugador_2" required disabled>
                    <option value="">Primero selecciona un jugador</option>
                </select>
            </div>

            <!-- CUADRO DE ADVERTENCIA DE ORDEN -->
            <div id="match-order-warning" class="match-preview hidden">
                <!-- Se rellena dinámicamente -->
            </div>

            <div class="form-group">
                <label>Resultados por Set:</label>
                <span class="help-text">Formato: 11-5, 11 9...</span>
                <div class="games-container">
                    <input type="text" id="g1" placeholder="Set 1">
                    <input type="text" id="g2" placeholder="Set 2">
                    <input type="text" id="g3" placeholder="Set 3">
                    <input type="text" id="g4" placeholder="Set 4">
                    <input type="text" id="g5" placeholder="Set 5">
                </div>
            </div>

            <button type="submit" id="btn-enviar" disabled>GUARDAR RESULTADO</button>
        </form>
    </div>

    <div id="admin-access-section" class="admin-unlock-card">
        <h4>¿Modificar un resultado existente?</h4>
        <input type="password" id="admin_key" placeholder="Clave de administrador">
        <button class="btn-unlock" onclick="desbloquearAdmin()">DESBLOQUEAR EDICIÓN</button>
    </div>
</div>

<div id="error-auth" class="hidden" style="text-align:center; padding:50px; color:red;">
    <h3>⚠️ Acceso Denegado</h3>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const SUPABASE_URL = "https://unbpmjgbcycyxdubmqnu.supabase.co"; 
    const SUPABASE_KEY = params.get('key') || "";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const HASH_T1 = "70955ed78d3cff207c71067386bf9a430cd93c8c98af7dde474f38d50383aac1";
    const HASH_T2 = "25f43b1486ad95a1398e3eeb3d83bc4010015fcc9bedb35b432e00298d5021f7";

    const t1 = params.get('token') || "";
    const t2 = params.get('token2') || "";
    const idTorneo = params.get('id_torneo');

    let cachePartidos = [];
    let cacheJugadores = {};
    let esAdmin = false;

    async function sha256(txt) {
        if(!txt) return "";
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function iniciar() {
        const h1 = await sha256(t1);
        if (h1 !== HASH_T1 || !idTorneo) {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('error-auth').classList.remove('hidden');
            return;
        }
        const h2 = await sha256(t2);
        if (h2 === HASH_T2) {
            esAdmin = true;
            document.getElementById('header').classList.add('admin-mode');
            document.getElementById('titulo-pagina').innerText = "Modo Administrador";
            document.getElementById('admin-access-section').classList.add('hidden');
        }
        document.getElementById('info').innerText = "Torneo: " + idTorneo;
        cargarDatos();
    }

    async function cargarDatos() {
        try {
            const { data: dataJ } = await _supabase.from('jugadores').select('*').eq('id_torneo', idTorneo);
            (dataJ || []).forEach(j => cacheJugadores[j.id_jugador] = j.nombre_jugador);

            const { data: dataP } = await _supabase.from('lista_partidos').select('*').eq('id_torneo', idTorneo);
            cachePartidos = dataP || [];
            
            actualizarListaLateral();
            actualizarDesplegableJugador1();
        } catch (e) { console.error(e); }
    }

    function actualizarListaLateral() {
        const divP = document.getElementById('lista-partidos');
        divP.innerHTML = "";
        const jugados = cachePartidos.filter(p => [p.g1, p.g2, p.g3, p.g4, p.g5].some(g => g && g !== "0-0"));
        const pendientes = cachePartidos.filter(p => ![p.g1, p.g2, p.g3, p.g4, p.g5].some(g => g && g !== "0-0"));
        const sortMatches = (a, b) => {
            if (a.tipo_partido !== b.tipo_partido) return a.tipo_partido.localeCompare(b.tipo_partido);
            const nombreA = `${cacheJugadores[a.id_jugador1]} - ${cacheJugadores[a.id_jugador2]}`;
            const nombreB = `${cacheJugadores[b.id_jugador1]} - ${cacheJugadores[b.id_jugador2]}`;
            return nombreA.localeCompare(nombreB);
        };
        jugados.sort(sortMatches); pendientes.sort(sortMatches);
        if (jugados.length > 0) {
            divP.innerHTML += '<div class="match-divider">Finalizados</div>';
            jugados.forEach(p => divP.innerHTML += renderRow(p, true));
        }
        if (pendientes.length > 0) {
            divP.innerHTML += '<div class="match-divider">Pendientes</div>';
            pendientes.forEach(p => divP.innerHTML += renderRow(p, false));
        }
    }

    function renderRow(p, done) {
        const n1 = cacheJugadores[p.id_jugador1] || 'J'+p.id_jugador1;
        const n2 = cacheJugadores[p.id_jugador2] || 'J'+p.id_jugador2;
        const scores = [p.g1, p.g2, p.g3, p.g4, p.g5].filter(s => s && s !== "0-0");
        const resText = done ? `<span class="score-preview">R: ${scores.join(' | ')}</span>` : '<span class="score-preview" style="color:#bbb">Pendiente</span>';
        return `<div class="match-item"><span style="font-size:0.7rem; color:#999;">${p.tipo_partido}</span><br><strong>${n1}</strong> vs <strong>${n2}</strong>${resText}</div>`;
    }

    function actualizarDesplegableJugador1() {
        const select1 = document.getElementById('select_jugador_1');
        select1.innerHTML = '<option value="">--- Selecciona tu nombre ---</option>';
        const idsInvolucrados = new Set();
        cachePartidos.forEach(p => {
            const esPendiente = ![p.g1, p.g2, p.g3, p.g4, p.g5].some(g => g && g !== "0-0");
            if (esAdmin || esPendiente) { idsInvolucrados.add(p.id_jugador1); idsInvolucrados.add(p.id_jugador2); }
        });
        const listaJugadores = Array.from(idsInvolucrados).map(id => ({ id: id, nombre: cacheJugadores[id] || 'J' + id })).sort((a, b) => a.nombre.localeCompare(b.nombre));
        listaJugadores.forEach(j => {
            const opt = document.createElement('option');
            opt.value = j.id; opt.innerText = j.nombre;
            select1.appendChild(opt);
        });
    }

    document.getElementById('select_jugador_1').addEventListener('change', function() {
        const idSel = parseInt(this.value);
        const select2 = document.getElementById('select_jugador_2');
        const warning = document.getElementById('match-order-warning');
        select2.innerHTML = '<option value="">--- Selecciona oponente ---</option>';
        select2.disabled = !idSel;
        warning.classList.add('hidden');
        if (!idSel) return;
        const oponentes = [];
        cachePartidos.forEach(p => {
            const esPendiente = ![p.g1, p.g2, p.g3, p.g4, p.g5].some(g => g && g !== "0-0");
            if (esAdmin || esPendiente) {
                let idOponente = null;
                if (p.id_jugador1 === idSel) idOponente = p.id_jugador2;
                else if (p.id_jugador2 === idSel) idOponente = p.id_jugador1;
                if (idOponente !== null) oponentes.push({ idMatch: p.id_partido, idOponente: idOponente, nombreOponente: cacheJugadores[idOponente] || 'J' + idOponente, grupo: p.tipo_partido });
            }
        });
        oponentes.sort((a, b) => a.nombreOponente.localeCompare(b.nombreOponente));
        oponentes.forEach(o => {
            const opt = document.createElement('option');
            opt.value = o.idMatch; opt.innerText = `${o.nombreOponente} (${o.grupo})`;
            select2.appendChild(opt);
        });
    });

    document.getElementById('select_jugador_2').addEventListener('change', function() {
        const idMatch = this.value;
        const btn = document.getElementById('btn-enviar');
        const warning = document.getElementById('match-order-warning');
        
        if (!idMatch) {
            btn.disabled = true;
            warning.classList.add('hidden');
            return;
        }

        btn.disabled = false;
        const partido = cachePartidos.find(p => p.id_partido === idMatch);
        const n1 = cacheJugadores[partido.id_jugador1];
        const n2 = cacheJugadores[partido.id_jugador2];

        // Mostrar advertencia de orden
        warning.innerHTML = `📌 <b>Información del Partido:</b><br>
                             ${partido.tipo_partido}<br><br>
                             ⚠️ <b>¡ATENCIÓN AL ORDEN DE PUNTOS!</b><br>
                             El primer número es para <b>${n1}</b><br>
                             El segundo número es para <b>${n2}</b>`;
        warning.classList.remove('hidden');
    });

    async function desbloquearAdmin() {
        const clave = document.getElementById('admin_key').value;
        const hash = await sha256(clave);
        if (hash === HASH_T2) {
            params.set('token2', clave);
            window.location.search = params.toString();
        } else { alert("Clave incorrecta."); }
    }

    document.getElementById('form-resultado').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar');
        const idPSelected = document.getElementById('select_jugador_2').value;
        const partido = cachePartidos.find(p => p.id_partido === idPSelected);
        const games = [];
        let hayVacio = false;
        for(let i=1; i<=5; i++) {
            let val = document.getElementById('g'+i).value.trim();
            if (val === "") { hayVacio = true; games.push("0-0"); }
            else {
                if (hayVacio) return alert(`Falta Set ${i-1}.`);
                const nums = val.match(/\d+/g);
                if (!nums || nums.length !== 2) return alert(`Set ${i} incorrecto.`);
                games.push(`${nums[0]}-${nums[1]}`);
            }
        }
        btn.disabled = true;
        const { error } = await _supabase.from('lista_partidos').upsert({
            id_torneo: idTorneo, id_partido: partido.id_partido, tipo_partido: partido.tipo_partido,
            id_jugador1: partido.id_jugador1, id_jugador2: partido.id_jugador2,
            g1: games[0], g2: games[1], g3: games[2], g4: games[3], g5: games[4],
            log: new Date().toISOString()
        });
        if (error) { alert(error.message); btn.disabled = false; }
        else { alert("✅ Guardado."); location.reload(); }
    });

    iniciar();
</script>
</body>
</html>
